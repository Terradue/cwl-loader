# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

site_name: CWL Loader
site_url: https://terradue.github.io/cwl-loader/
site_author: Fabrice Brito, Simone Tripodi
repo_url: https://github.com/Terradue/cwl-loader/
repo_name: Terradue/cwl-loader

theme:
    logo: imgs/icon-eoap.png
    name: material

    palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search
  - mermaid2:
      version: 11.4.1
  - mkdocs-jupyter:
      execute: true
      show_input: True
      no_input: False

markdown_extensions:
  - pymdownx.details
  - abbr
  - admonition
  - footnotes
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - attr_list
  - pymdownx.snippets:
      base_path: './'
  - pymdownx.highlight:
      line_spans: __span

extra_css:
  - styles/css/app.css

extra_javascript:
  - javascripts/config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tutorials:
    - Overview: tutorials/index.md
    - First steps: tutorials/first-steps.md
    - Notebook examples: examples.ipynb
  - How-to guides:
    - Overview: how-to/index.md
    - Load and serialize CWL: how-to/load-and-dump.md
    - Bundle a workflow: how-to/bundle-a-workflow.md
  - Reference:
    - Overview: reference/index.md
    - CLI: reference/cli.md
    - API: api/latest/cwl_loader.md
  - Explanation:
    - Overview: explanation/index.md
    - Loading model: explanation/loading-model.md

copyright: <a href="https://www.apache.org/licenses/LICENSE-2.0"><img src="https://img.shields.io/badge/license-Apache%20License%202.0-blue"" alt="Apache License, Version 2.0" /></a>
